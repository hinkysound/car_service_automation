<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="utf-8">
        <title>Автосервис Западный</title>
        <script src="https://cdn.tailwindcss.com"></script>
    </head>
    <body class="m-0 p-0">
        <div class="flex flex-col w-full h-screen overflow-hidden">
            <header class="w-full h-20 bg-[#d73b35] flex justify-between items-center">
                <div>
                    <img src='images/logo.png' class="flex flex-1 h-20 pl-5 border border-[#bb3731] items-center justify-center">
                </div>
                <div class="flex flex-1 h-full border border-[#bb3731] items-center justify-center">
                    Заявки
                </div>
                <div class="flex flex-1 h-full border border-[#bb3731] items-center justify-center">
                    Записи
                </div>
                <div class="flex flex-1 h-full border border-[#bb3731] items-center justify-center">
                    Возвраты
                </div>
            </header>
            <main class="flex flex-1 justify-between overflow-hidden">
                <sidebar class="w-32 h-full bg-zinc-100">
                    Здесь какая-то панель
                </sidebar>
                <div class="flex-1 flex-col justify-start items-center w-4/5 bg-white overflow-y-auto">
                    <div class="h-64 w-full bg-red-400">
                        Блок 1
                    </div>
                    <div class="h-64 w-full bg-red-300">
                        Блок 2
                    </div>
                    <div class="h-64 w-full bg-red-300">
                        Блок 3
                    </div>
                    <div class="h-64 w-full bg-red-400">
                        Блок 4
                    </div>
                    <div class="h-64 w-full bg-red-300">
                        Блок 5
                    </div>
                    <div class="h-64 w-full bg-red-400">
                        Блок 6
                    </div>
                </div>
            </main>
        </div>
    </body>
</html>
